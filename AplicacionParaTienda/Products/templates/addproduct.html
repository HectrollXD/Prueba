{% extends 'shared/body.html' %}

{% block content %}
    
        <div class="col-lg-12 col-md-12 col-sm-12">
            <form method="POST">
                <!-- name of product -->
                <div class="row form-group">
                    <div class="col-lg-2 col-md-4 col-sm-12 text-center text-sm-center text-md-right text-lg-right text-xl-right"> <!-- label -->
                        <label for="productname">Product name</label>
                    </div>
                    <div class="col-lg-10 col-md-8 col-sm-12"> <!-- input -->
                        <input type="text" name="Product_Name" id="productname" class="form-control">
                    </div>
                </div>
                <!-- description of product -->
                <div class="row form-group mt-4">
                    <div class="col-lg-2 col-md-4 col-sm-12 text-center text-sm-center text-md-right text-lg-right text-xl-right"> <!-- label -->
                        <label for="productdescription">Product description</label>
                    </div>
                    <div class="col-lg-10 col-md-8 col-sm-12"> <!-- input -->
                        <input type="text" name="Product_Description" id="productdescription" class="form-control">
                    </div>
                </div>
                <!-- two inputs (id and price) -->
                <div class="row form-group mt-4 mt-lg-2 mt-xl-4">
                    <!-- product id -->
                    <div class="col-lg-6 col-md-12 col-sm-12">
                        <div class="row">
                            <div class="col-lg-4 col-md-4 col-sm-12 text-center text-sm-center text-md-right text-lg-right text-xl-right"> <!-- label -->
                                <label for="productid">Product ID</label>
                            </div>
                            <div class="col-lg-8 col-md-8 col-sm-12"> <!-- input -->
                                <input type="text" name="Product_ID" id="productid" class="form-control">
                            </div>
                        </div>
                    </div>
                    <!-- price of product -->
                    <div class="col-lg-6 col-md-12 col-sm-12">
                        <div class="row mt-4 mt-sm-4 mt-md-4 mt-lg-0">
                            <div class="col-lg-4 col-md-4 col-sm-12 text-center text-sm-center text-md-right text-lg-right text-xl-right"> <!-- label -->
                                <label for="productprice">Product price</label>
                            </div>
                            <div class="col-lg-8 col-md-8 col-sm-12"> <!-- input -->
                                <input type="text" name="Product_Price" id="productprice" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- two inputs (department and provider) -->
                <div class="row form-group mt-4">
                    <!-- department -->
                    <div class="col-lg-6 col-md-12 col-sm-12">
                        <div class="row">
                            <div class="col-lg-4 col-md-4 col-sm-12 text-center text-sm-center text-md-right text-lg-right text-xl-right"> <!-- label -->
                                <label for="department">Department</label>
                            </div>
                            <div class="col-lg-8 col-md-8 col-sm-12"> <!-- input -->
                                <select name="Department" id="department" class="form-control text-center">
                                    <option value="0" selected>- Select a department -</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <!-- provider -->
                    <div class="col-lg-6 col-md-12 col-sm-12">
                        <div class="row mt-4 mt-sm-4 mt-md-4 mt-lg-0">
                            <div class="col-lg-4 col-md-4 col-sm-12 text-center text-sm-center text-md-right text-lg-right text-xl-right"> <!-- label -->
                                <label for="provider">Provider</label>
                            </div>
                            <div class="col-lg-8 col-md-8 col-sm-12"> <!-- input -->
                                <select name="Provider" id="provider" class="form-control text-center">
                                    <option value="0" selected>- Select a provider -</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- buttons -->
                <div class="row form-group mt-4">
                    <div class="col-12 col-sm-12 col-md-4 col-lg-2 col-xl-2 offset-md-4 offset-lg-8 offset-xl-8">
                        <button class="btn btn-warning form-control" type="button">
                            Clear form 
                            <i class="bi bi-eraser"></i>
                        </button>
                    </div>
                    <div class="col-12 col-sm-12 col-md-4 col-lg-2 col-xl-2 mt-4 mt-sm-4 mt-md-0 mt-lg-0 mt-xl-0">
                        <button class="btn btn-success form-control" type="submit">
                            Add product 
                            <i class="bi bi-plus-square"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
{% endblock %}
