{% extends 'shared/body.html' %}

{% block content %}
    <div class="col-lg-12">
        <form method="POST">
            {% csrf_token %}
            <div class="row">
                <div class="col-lg-12">
                    <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="bi bi-person"> Username</i>
                                </span>
                            </div>
                            {{ camp.user }}
                        </div>
                </div>
                <div class="col-lg-12 mt-4">
                    <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="bi bi-key"> Password</i>
                                </span>
                            </div>
                            {{ camp.password }}
                        </div>
                </div>
                <div class="col-lg-12 mt-4">
                    <div class="row">
                        <div class="col-6 text-right offset-4">
                            <a href="{% url 'createuserpage' %}">Create new account</a>            
                        </div>
                        <div class="col-2">
                            <button type="submit" class="btn btn-secondary form-control">Login</button>  
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
